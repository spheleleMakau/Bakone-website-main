services:
  - type: web
    name: bakone-django
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: |
      set -e
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
      gunicorn bakone.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
    staticPublishPath: staticfiles

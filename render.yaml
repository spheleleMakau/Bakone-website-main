services:
  - type: web
    name: bakone-django
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: |
      set -e
      python manage.py migrate --noinput
      python manage.py showmigrations auth
      python -c "import os; import django; os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'bakone.settings'); django.setup(); from django.db import connection; c = connection.cursor(); c.execute('SELECT 1 FROM auth_user LIMIT 1'); print('auth_user table verified')"
      python manage.py collectstatic --noinput
      gunicorn bakone.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
    staticPublishPath: staticfiles
